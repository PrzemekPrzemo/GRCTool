services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: grctool/app:latest
    container_name: grctool-app
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_DEBUG: "${APP_DEBUG:-true}"
      APP_KEY: ${APP_KEY}
      APP_URL: ${APP_URL:-http://localhost:8000}
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: grctool
      DB_USERNAME: grctool
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      SESSION_DRIVER: database
      SESSION_SECURE_COOKIE: "${SESSION_SECURE_COOKIE:-false}"
      SESSION_SAME_SITE: lax
      MAIL_MAILER: ${MAIL_MAILER:-log}
      QUEUE_CONNECTION: database
      LOG_CHANNEL: stack
    volumes:
      - app-public:/var/www/html/public
      - app-storage:/var/www/html/storage
      - evidence-vault:/var/grc/evidence
    networks:
      - grctool

  mysql:
    image: mysql:8.4
    container_name: grctool-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: grctool
      MYSQL_USER: grctool
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootsecret}
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - grctool
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "grctool", "-p$${MYSQL_PASSWORD}"]
      interval: 10s
      retries: 5
      start_period: 30s

  nginx:
    image: nginx:1.27-alpine
    container_name: grctool-nginx
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "8000:80"
      - "80:80"
    volumes:
      - app-public:/var/www/html/public:ro
      - app-storage:/var/www/html/storage:ro
      - ./docker/nginx/local.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - grctool

  queue:
    image: grctool/app:latest
    container_name: grctool-queue
    restart: unless-stopped
    depends_on:
      - app
      - mysql
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_KEY: ${APP_KEY}
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_DATABASE: grctool
      DB_USERNAME: grctool
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      QUEUE_CONNECTION: database
    command: php artisan queue:work --sleep=3 --tries=3 --max-time=3600
    volumes:
      - app-storage:/var/www/html/storage
      - evidence-vault:/var/grc/evidence
    networks:
      - grctool

  scheduler:
    image: grctool/app:latest
    container_name: grctool-scheduler
    restart: unless-stopped
    depends_on:
      - app
      - mysql
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_KEY: ${APP_KEY}
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_DATABASE: grctool
      DB_USERNAME: grctool
      DB_PASSWORD: ${DB_PASSWORD:-secret}
    entrypoint: /bin/sh
    command: -c "while true; do php artisan schedule:run --verbose --no-interaction; sleep 60; done"
    volumes:
      - app-storage:/var/www/html/storage
    networks:
      - grctool

volumes:
  mysql-data:
  app-public:
  app-storage:
  evidence-vault:

networks:
  grctool:
    driver: bridge
