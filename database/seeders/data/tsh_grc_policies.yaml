# =============================================================================
# CONTROLS — Granularne kontrole per polityka
# Schemat każdej kontroli:
#   control_id:       unikalny ID (POLICY_ID.numer)
#   title:            nazwa kontroli
#   description:      co wymaga / co egzekwuje
#   policy_ref:       ID polityki źródłowej
#   section_ref:      sekcja w dokumencie
#   control_type:     preventive | detective | corrective | directive
#   implementation_type: technical | procedural | physical | managerial
#   status:           implemented | partial | planned | not_applicable
#   owner:            rola odpowiedzialna za kontrolę
#   evidence_type:    co stanowi dowód wdrożenia
#   review_frequency: jak często weryfikowana
#   data_classification_scope: [L1,L2,L3,L4] — dla jakich poziomów obowiązuje
#   framework_mappings:
#     - framework: ID standardu
#       control_ref: referencja w standardzie
#       mapping_type: full | partial | supporting
# =============================================================================
controls:

# ─────────────────────────────────────────────────────────────────────────────
# ISP — GOVERNANCE & MANAGEMENT CONTROLS
# ─────────────────────────────────────────────────────────────────────────────

  - control_id: ISP.GOV.01
    title: "Zatwierdzenie i własność Polityki Bezpieczeństwa Informacji"
    description: >
      ISP jest formalnie zatwierdzony przez Zarząd TSH, ma przypisanego właściciela
      (CISO), datę zatwierdzenia, wersję i cykl przeglądu. Dokument jest dostępny
      dla wszystkich pracowników i współpracowników.
    policy_ref: ISP
    section_ref: "ISP rozdz. 1, Metadane"
    control_type: directive
    implementation_type: managerial
    status: planned
    owner: "CISO / Zarząd"
    evidence_type: "Podpisany dokument ISP z datą zatwierdzenia; protokół z posiedzenia Zarządu"
    review_frequency: annual
    data_classification_scope: [L1,L2,L3,L4]
    framework_mappings:
      - framework: ISO27001
        control_ref: "5.1 — Polityki bezpieczeństwa informacji"
        mapping_type: full
      - framework: ISO27002
        control_ref: "5.1"
        mapping_type: full
      - framework: NIST_CSF
        control_ref: "GV.PO-01"
        mapping_type: full
      - framework: SOC2
        control_ref: "CC1.3 — Board oversight"
        mapping_type: supporting
      - framework: NCA_ECC
        control_ref: "1-1 Cybersecurity Policy"
        mapping_type: full
      - framework: SAMA_CSF
        control_ref: "3.1.1"
        mapping_type: full

  - control_id: ISP.GOV.02
    title: "Trójpoziomowa struktura zarządzania ISMS"
    description: >
      TSH utrzymuje trójpoziomową strukturę governance: strategiczny (Zarząd),
      taktyczny (CISO), operacyjny (IT, Tech Lead, pracownicy). Role i
      odpowiedzialności są udokumentowane w ISP rozdz. 5.
    policy_ref: ISP
    section_ref: "ISP rozdz. 4-5"
    control_type: directive
    implementation_type: managerial
    status: planned
    owner: "Zarząd / CISO"
    evidence_type: "Org chart security; opis ról w ISP; macierz RACI"
    review_frequency: annual
    data_classification_scope: [L1,L2,L3,L4]
    framework_mappings:
      - framework: ISO27001
        control_ref: "5.3 — Role, odpowiedzialności i uprawnienia"
        mapping_type: full
      - framework: ISO27002
        control_ref: "5.2"
        mapping_type: full
      - framework: NIST_CSF
        control_ref: "GV.RR-01, GV.RR-02"
        mapping_type: full
      - framework: SOC2
        control_ref: "CC1.3, CC1.4"
        mapping_type: full
      - framework: NIS2
        control_ref: "Art. 20 — Governance"
        mapping_type: full
      - framework: DORA
        control_ref: "Art. 5 — ICT Risk Management governance"
        mapping_type: full

  - control_id: ISP.GOV.03
    title: "Cykl przeglądu i aktualizacji polityki"
    description: >
      ISP i polityki zależne są przeglądane minimum raz w roku oraz po istotnych
      zmianach (incydent, zmiana regulacyjna, zmiana technologiczna). Wyniki
      przeglądu są dokumentowane w historii zmian dokumentu.
    policy_ref: ISP
    section_ref: "ISP rozdz. 12"
    control_type: directive
    implementation_type: managerial
    status: planned
    owner: "CISO"
    evidence_type: "Historia zmian dokumentu; protokół przeglądu rocznego"
    review_frequency: annual
    data_classification_scope: [L1,L2,L3,L4]
    framework_mappings:
      - framework: ISO27001
        control_ref: "10.2 — Ciągłe doskonalenie"
        mapping_type: full
      - framework: ISO27002
        control_ref: "5.1 (review)"
        mapping_type: full
      - framework: NIST_CSF
        control_ref: "GV.PO-02"
        mapping_type: full
      - framework: NCA_ECC
        control_ref: "1-1-3 Policy review"
        mapping_type: full

  - control_id: ISP.GOV.04
    title: "Zarządzanie ryzykiem bezpieczeństwa informacji"
    description: >
      TSH prowadzi formalny proces zarządzania ryzykiem oparty na ISO 27005
      i FAIR: identyfikacja aktywów, ocena zagrożeń i podatności, decyzja o
      postępowaniu z ryzykiem, rejestr ryzyk aktualizowany minimum kwartalnie.
    policy_ref: ISP
    section_ref: "ISP rozdz. 6"
    control_type: directive
    implementation_type: managerial
    status: planned
    owner: "CISO"
    evidence_type: "Rejestr ryzyk; raporty oceny ryzyka; protokoły akceptacji ryzyka rezydualnego"
    review_frequency: quarterly
    data_classification_scope: [L1,L2,L3,L4]
    framework_mappings:
      - framework: ISO27001
        control_ref: "6.1.2 — Ocena ryzyka; 6.1.3 — Postępowanie z ryzykiem"
        mapping_type: full
      - framework: ISO27002
        control_ref: "5.3"
        mapping_type: full
      - framework: NIST_CSF
        control_ref: "GV.RM-01, GV.RM-02, ID.RA-01..06"
        mapping_type: full
      - framework: SOC2
        control_ref: "CC3.1..CC3.4 — Risk Assessment"
        mapping_type: full
      - framework: NIS2
        control_ref: "Art. 21(2)(a) — Risk analysis"
        mapping_type: full
      - framework: DORA
        control_ref: "Art. 6 — ICT Risk Management framework"
        mapping_type: full
      - framework: NCA_ECC
        control_ref: "1-3 Cybersecurity Risk Management"
        mapping_type: full
      - framework: SAMA_CSF
        control_ref: "3.2 — Risk Management"
        mapping_type: full

# ─────────────────────────────────────────────────────────────────────────────
# POL-01 — KLASYFIKACJA DANYCH
# ─────────────────────────────────────────────────────────────────────────────

  - control_id: POL01.DC.01
    title: "Czterostopniowy model klasyfikacji danych (L1–L4)"
    description: >
      TSH stosuje czterostopniowy model klasyfikacji: L1 (Public), L2 (Internal),
      L3 (Confidential), L4 (Restricted). Każdy pracownik jest zobowiązany do
      klasyfikowania informacji przed jej udostępnieniem lub przetworzeniem.
    policy_ref: POL-01
    section_ref: "POL-01 sekcja JAK? — 4 poziomy"
    control_type: directive
    implementation_type: managerial
    status: planned
    owner: "CISO / wszyscy pracownicy"
    evidence_type: "Opublikowana polityka POL-01; szkolenia potwierdzające zapoznanie"
    review_frequency: annual
    data_classification_scope: [L1,L2,L3,L4]
    framework_mappings:
      - framework: ISO27002
        control_ref: "5.12 — Klasyfikacja informacji"
        mapping_type: full
      - framework: ISO27001
        control_ref: "A.5.12"
        mapping_type: full
      - framework: NIST_CSF
        control_ref: "ID.AM-05"
        mapping_type: full
      - framework: SOC2
        control_ref: "CC6.1 — Logical access (classification basis)"
        mapping_type: supporting
      - framework: NCA_ECC
        control_ref: "2-2 Information Classification"
        mapping_type: full
      - framework: HIPAA
        control_ref: "164.312(a)(1) — Access control (PHI = L4)"
        mapping_type: supporting

  - control_id: POL01.DC.02
    title: "Domyślna klasyfikacja L3 dla danych projektów klientów"
    description: >
      W braku odmiennego ustalenia kontraktowego, wszystkie dane i kod
      udostępniane przez klienta są domyślnie klasyfikowane jako L3 (Confidential).
      Dane zdrowotne, finansowe regulowane lub dane szczególnych kategorii RODO
      automatycznie uzyskują klasyfikację L4 (Restricted).
    policy_ref: POL-01
    section_ref: "POL-01 Annex A.5"
