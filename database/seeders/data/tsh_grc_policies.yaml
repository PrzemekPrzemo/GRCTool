        mapping_type: full
      - framework: SAMA_CSF
        control_ref: "3.4 — Incident Response"
        mapping_type: full
      - framework: HIPAA
        control_ref: "164.308(a)(6) — Security Incident Procedures"
        mapping_type: full

  - control_id: POL06.IR.02
    title: "Notyfikacje regulacyjne: GDPR 72h, NIS2 24h/72h, DORA"
    description: >
      TSH posiada udokumentowaną procedurę notyfikacji organów nadzorczych
      i klientów przy naruszeniach danych. GDPR: zgłoszenie do UODO w 72h
      (jeśli ryzyko dla osób). NIS2/KSC: early warning 24h + zgłoszenie 72h.
      Klienci (DPA): 24-48h od wykrycia. DORA: zgodnie z wymogami kontraktowymi.
