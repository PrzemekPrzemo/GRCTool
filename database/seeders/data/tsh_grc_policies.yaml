        mapping_type: supporting

  - control_id: POL03.DLP.04
    title: "Secret scanning w repozytoriach kodu"
    description: >
      Repozytoria kodu są skanowane pod kątem przypadkowo wklejonych sekretów
      (klucze API, certyfikaty, hasła) w każdym commicie przez pipeline CI/CD.
