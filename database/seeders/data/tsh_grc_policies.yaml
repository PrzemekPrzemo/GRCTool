    evidence_type: "Dokument Threat Model per projekt; DFD; tabela STRIDE"
    review_frequency: per_project
    data_classification_scope: [L3,L4]
    framework_mappings:
      - framework: ISO27002
        control_ref: "8.27 — Bezpieczne zasady inżynierii systemów"
        mapping_type: full
      - framework: OWASP_SAMM
        control_ref: "Design/Threat Assessment/2"
        mapping_type: full
      - framework: NIST_SSDF
        control_ref: "PW.1.2 — Identify threats"
        mapping_type: full
      - framework: NIST_CSF
        control_ref: "ID.RA-03"
        mapping_type: full
      - framework: DORA
        control_ref: "Art. 25 — Advanced testing (TLPT)"
        mapping_type: supporting

  - control_id: SSDLC.SEC.01
