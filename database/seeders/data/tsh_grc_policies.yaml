      Wszystkie urządzenia korporacyjne są zarządzane przez Kandji MDM.
      Urządzenia BYOD wymagają rejestracji w MDM (model MAM/kontener firmowy).
      Conditional Access blokuje urządzenia niespełniające minimalnych wymagań
      (szyfrowanie, screensaver, aktualny OS, aktywny EDR).
