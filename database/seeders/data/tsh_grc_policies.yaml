# =============================================================================
# TSH GRC KNOWLEDGE BASE — POLICY & CONTROL REGISTRY
# =============================================================================
# Plik: tsh_grc_policies.yaml
# Przeznaczenie: Import merytoryczny polityk TSH do systemu GRC.
#   Zawiera: encje polityk, granularne kontrole, mapowania na standardy,
#   pokrycie regulacyjne (EU/USA/KSA), status implementacji.
# Użycie: Wgraj do Claude Code jako kontekst. System GRC parsuje YAML
#   i tworzy encje Policy + Control + FrameworkMapping.
# Wersja bazy wiedzy: 1.0
# Ostatnia aktualizacja: 2026-07
# Właściciel: Head of Cybersecurity / CISO, The Software House
# =============================================================================

# ── METADATA ──────────────────────────────────────────────────────────────────
grc_metadata:
  organization: "The Software House (TSH)"
  schema_version: "1.0"
  knowledge_base_id: "tsh-grc-kb-2026"
  jurisdictions: [EU, USA, KSA]
  policy_language: pl
  control_language: pl
  frameworks_covered:
    - ISO/IEC 27001:2022
    - ISO/IEC 27002:2022
    - NIST CSF 2.0
    - SOC 2 (AICPA TSC 2017)
    - GDPR/RODO
    - NIS2 (Dyrektywa 2022/2555)
    - DORA (Rozporządzenie 2022/2554)
    - KSA NCA ECC-1:2018
    - KSA SAMA CSF
    - KSA PDPL
    - HIPAA Security Rule
    - CMMC 2.0 (Level 2)
    - OWASP SAMM 2.0
    - NIST SP 800-218 (SSDF)

# ── SŁOWNIKI ──────────────────────────────────────────────────────────────────
dictionaries:
  control_status:
    implemented:    "Wdrożona — dowody dostępne"
    partial:        "Częściowa — w trakcie wdrożenia"
    planned:        "Zaplanowana — brak wdrożenia"
    not_applicable: "Nie dotyczy — udokumentowane uzasadnienie"
    exception:      "Wyjątek zatwierdzony — kompensaty zdefiniowane"

  data_classification:
    L1: "Public — bez ograniczeń"
    L2: "Internal — tylko pracownicy TSH"
    L3: "Confidential — need-to-know, dane klienta"
    L4: "Restricted — dane wrażliwe (PHI, dane finansowe regulowane)"

  risk_levels: [critical, high, medium, low]

  policy_lifecycle:
    draft:    "Wersja robocza"
    approved: "Zatwierdzona przez Zarząd"
    review:   "W przeglądzie"
    retired:  "Wycofana"

# ── FRAMEWORK REFERENCE MAP ───────────────────────────────────────────────────
# Skrócone ID standardów używane w mapowaniach kontroli
framework_ids:
  ISO27001:  "ISO/IEC 27001:2022"
  ISO27002:  "ISO/IEC 27002:2022"
  NIST_CSF:  "NIST CSF 2.0"
  SOC2:      "SOC 2 TSC 2017"
  GDPR:      "GDPR/RODO (Rozporządzenie UE 2016/679)"
  NIS2:      "Dyrektywa NIS2 (2022/2555)"
  DORA:      "Digital Operational Resilience Act (2022/2554)"
  NCA_ECC:   "KSA NCA Essential Cybersecurity Controls ECC-1:2018"
  SAMA_CSF:  "KSA SAMA Cyber Security Framework"
  PDPL:      "KSA Personal Data Protection Law"
  HIPAA:     "HIPAA Security Rule (45 CFR Part 164)"
  CMMC:      "CMMC 2.0 Level 2"
  OWASP_SAMM: "OWASP SAMM 2.0"
  NIST_SSDF: "NIST SP 800-218 (SSDF)"

