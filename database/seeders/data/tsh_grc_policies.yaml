  - control_id: POL04.DEV.02
    title: "Hardening macOS — Kandji Blueprint"
    description: >
      Standardowy blueprint Kandji wymusza: FileVault 2 (szyfrowanie dysku,
      escrow w Kandji), screensaver lock po 5 min, Firewall macOS (stealth mode),
      Gatekeeper (App Store + identified developers only), SIP włączone,
      automatyczne patche bezpieczeństwa (0 dni odroczenia), EDR aktywny.
    policy_ref: POL-04
    section_ref: "POL-04 Annex D; Wytyczne Config Kandji sekcja 1.1"
    control_type: preventive
    implementation_type: technical
    status: partial
    owner: "IT"
    evidence_type: "Kandji blueprint config export; compliance score dashboard (cel ≥ 95%)"
    review_frequency: monthly
    data_classification_scope: [L2,L3,L4]
    framework_mappings:
      - framework: ISO27002
        control_ref: "8.9 — Zarządzanie konfiguracją"
        mapping_type: full
      - framework: NIST_CSF
        control_ref: "PR.PS-01, PR.PS-02"
        mapping_type: full
      - framework: NCA_ECC
        control_ref: "2-4-1, 2-4-2"
        mapping_type: full
      - framework: CMMC
        control_ref: "CM.L2-3.4.2 — Security configuration settings"
        mapping_type: full

  - control_id: POL04.DEV.03
    title: "Whitelist aplikacji (Kandji Managed Software)"
    description: >
      Tylko aplikacje z zatwierdzonej listy mogą być zainstalowane na urządzeniach
      korporacyjnych. Kandji Managed Software wymusza listę w trybie Warn
      (tymczasowo) → Block (po zatwierdzeniu whitelisty). Gatekeeper na poziomie
