      Wprowadzanie danych L3/L4 do publicznych niezatwierdzonych narzędzi GenAI
      jest zabronione. CISO publikuje i aktualizuje listę zatwierdzonych narzędzi
      AI (enterprise, z gwarancją braku trenowania na danych). Monitoring
      i blokowanie nieautoryzowanych narzędzi AI na poziomie sieciowym/endpoint.
