    section_ref: "POL-SSDLC sekcja 3.4, 3.7; SSDLC-DEV Annex A"
    control_type: detective
    implementation_type: technical
    status: planned
    owner: "DevOps / Tech Lead"
    evidence_type: "Konfiguracja Trivy/Dependabot; raporty SCA; log naprawionych CVE"
    review_frequency: continuous
    data_classification_scope: [L2,L3,L4]
    framework_mappings:
