      - framework: DORA
        control_ref: "Art. 25 — Testing of ICT systems; Art. 26 — TLPT"
        mapping_type: full
      - framework: SOC2
        control_ref: "CC4.2 — Penetration testing"
        mapping_type: full

# ─────────────────────────────────────────────────────────────────────────────
# POL-QA — TESTOWANIE I QA
# ─────────────────────────────────────────────────────────────────────────────

  - control_id: QA.TEST.01
    title: "Pokrycie testami automatycznymi — unit, integration, E2E"
    description: >
      Każda zmiana kodu w projektach TSH wymaga odpowiedniego pokrycia testami:
      unit tests (deweloper, ≥70% logiki biznesowej), integration tests
      (dev+QA), E2E tests (QA, na staging przed każdym wdrożeniem produkcyjnym).
      Żadna funkcjonalność nie jest uznana za ukończoną bez testów w DoD.
    policy_ref: POL-QA
    section_ref: "POL-QA sekcja 3.1..3.3"
    control_type: preventive
    implementation_type: procedural
    status: planned
    owner: "Tech Lead / QA Engineer"
    evidence_type: "Raporty coverage (Istanbul, JaCoCo); wyniki E2E w CI; DoD per projekt"
    review_frequency: per_sprint
    data_classification_scope: [L2,L3,L4]
    framework_mappings:
      - framework: ISO27002
        control_ref: "8.29 — Testy bezpieczeństwa w SDLC"
        mapping_type: supporting
      - framework: OWASP_SAMM
        control_ref: "Verification/Requirements-driven Testing/1"
        mapping_type: full
      - framework: SOC2
        control_ref: "CC8.1 — Change management testing"
        mapping_type: full
      - framework: NIST_SSDF
        control_ref: "RV.1.2"
        mapping_type: supporting

  - control_id: QA.TEST.02
    title: "Zakaz używania danych produkcyjnych w środowiskach testowych"
    description: >
      Kopiowanie danych produkcyjnych (szczególnie PII, PHI, dane finansowe)
      do środowisk dev/staging jest bezwzględnie zabronione. Wymagane jest
      używanie danych syntetycznych (Faker.js, Faker Python, Mockaroo) lub
      zanonimizowanych. Naruszenie stanowi incydent GDPR.
    policy_ref: POL-QA
    section_ref: "POL-QA sekcja 5; QA-DEV"
    control_type: preventive
    implementation_type: directive
    status: planned
    owner: "Tech Lead / QA"
    evidence_type: "Polityka środowisk testowych; szkolenia; audyt środowisk testowych"
    review_frequency: quarterly
    data_classification_scope: [L3,L4]
    framework_mappings:
      - framework: GDPR
        control_ref: "Art. 5(1)(b) — Purpose limitation; Art. 25 — Privacy by design"
        mapping_type: full
      - framework: ISO27002
        control_ref: "8.33 — Dane testowe"
        mapping_type: full
      - framework: HIPAA
        control_ref: "164.312(a)(1) — Access control (PHI in test env)"
        mapping_type: full
      - framework: SOC2
        control_ref: "CC6.6 — Logical access to production data"
        mapping_type: full

  - control_id: QA.TEST.03
    title: "Testy autoryzacji i kontroli dostępu (IDOR, unauthorized access)"
    description: >
      QA Engineer testuje każdy endpoint API pod kątem: braku tokenu (→401),
      niewystarczających uprawnień (→403), próby dostępu do zasobu innego
      użytkownika (IDOR check). Testy walidacji danych wejściowych (XSS,
      SQLi w polach, edge cases). Wyniki bugów security → zgłoszenie do CISO.
    policy_ref: POL-QA
    section_ref: "POL-QA sekcja 3.6; QA-DEV sekcja testy bezpieczeństwa"
    control_type: detective
    implementation_type: procedural
    status: planned
    owner: "QA Engineer"
    evidence_type: "Scenariusze testowe BDD z IDOR; wyniki testów autoryzacji; logi testów"
    review_frequency: per_release
    data_classification_scope: [L3,L4]
    framework_mappings:
      - framework: ISO27002
        control_ref: "8.29"
        mapping_type: full
      - framework: OWASP_SAMM
        control_ref: "Verification/Security Testing/2"
        mapping_type: full
      - framework: NIST_SSDF
        control_ref: "RV.1.2"
        mapping_type: full
      - framework: SOC2
        control_ref: "CC6.3"
        mapping_type: supporting

  - control_id: QA.TEST.04
    title: "Klasyfikacja i SLA naprawy defektów"
    description: >
      TSH stosuje czterostopniową klasyfikację defektów: Critical (hotfix <24h),
      High (<3 dni robocze), Medium (najbliższy sprint), Low (backlog).
      Defekty bezpieczeństwa (niezależnie od priorytetu) wymagają dodatkowego
      zgłoszenia do CISO. Retest przez QA przed zamknięciem każdego defektu.
    policy_ref: POL-QA
    section_ref: "POL-QA sekcja 4"
    control_type: corrective
    implementation_type: procedural
    status: planned
    owner: "QA Engineer / Tech Lead"
    evidence_type: "System ticketowy z SLA; historia defektów; raporty metryki escape rate"
    review_frequency: per_sprint
    data_classification_scope: [L1,L2,L3,L4]
    framework_mappings:
      - framework: ISO27002
        control_ref: "8.8 — Zarządzanie podatnościami technicznymi"
        mapping_type: supporting
      - framework: OWASP_SAMM
        control_ref: "Operations/Incident Management/1"
        mapping_type: supporting
      - framework: SOC2
        control_ref: "CC7.2 — Defect tracking"
        mapping_type: full


