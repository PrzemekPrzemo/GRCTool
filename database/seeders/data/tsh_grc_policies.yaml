        control_ref: "8.29, 8.8 — Zarządzanie podatnościami technicznymi"
        mapping_type: full
      - framework: OWASP_SAMM
        control_ref: "Implementation/Secure Build/1 (SCA)"
        mapping_type: full
      - framework: NIST_SSDF
        control_ref: "PW.4.1 — Reuse existing secure components"
        mapping_type: full
      - framework: NIST_CSF
        control_ref: "ID.RA-01"
        mapping_type: supporting
      - framework: CMMC
        control_ref: "RA.L2-3.11.2 — Vulnerability scan"
        mapping_type: full

  - control_id: SSDLC.DEV.04
    title: "Threat Modeling dla projektów wysokiego ryzyka"
    description: >
      Projekty obejmujące dane L3/L4 lub systemy krytyczne klienta wymagają
      udokumentowanego Threat Model (metodologia STRIDE) przed startem
