  - control_id: SSDLC.REQ.01
    title: "Wymagania bezpieczeństwa definiowane na etapie planowania"
    description: >
      Na etapie inicjowania projektu Tech Lead/PM określa klasyfikację danych,
      identyfikuje wymagania regulacyjne (GDPR, HIPAA, PCI-DSS) i uwzględnia
      wymagania bezpieczeństwa w Definition of Done dla User Stories.
    policy_ref: POL-SSDLC
    section_ref: "POL-SSDLC sekcja 3.1"
    control_type: preventive
    implementation_type: procedural
    status: planned
    owner: "Tech Lead / PM"
    evidence_type: "DoD z klauzulami security; dokumentacja klasyfikacji projektu"
    review_frequency: per_project
    data_classification_scope: [L3,L4]
    framework_mappings:
      - framework: ISO27002
        control_ref: "8.26 — Wymagania bezpieczeństwa aplikacji"
        mapping_type: full
      - framework: OWASP_SAMM
        control_ref: "Design/Security Requirements/1"
        mapping_type: full
      - framework: NIST_SSDF
        control_ref: "PW.1.1 — Define security requirements"
        mapping_type: full
      - framework: NIST_CSF
        control_ref: "ID.RA-01"
        mapping_type: supporting
      - framework: CMMC
        control_ref: "CA.L2-3.12.1 — Security assessment"
        mapping_type: supporting

  - control_id: SSDLC.DEV.01
    title: "Obowiązkowe code review z perspektywą bezpieczeństwa"
    description: >
      Każda zmiana kodu trafiająca do głównej gałęzi wymaga co najmniej
      jednego peer review przez osobę inną niż autor. Reviewer weryfikuje
      m.in.: brak sekretów, walidacja danych wejściowych, poprawna autoryzacja,
      brak oczywistych podatności OWASP Top 10. Branch protection wymuszone.
    policy_ref: POL-SSDLC
    section_ref: "POL-SSDLC sekcja 3.4"
    control_type: detective
    implementation_type: procedural
    status: planned
    owner: "Tech Lead"
    evidence_type: "Branch protection rules w repozytorium; historia PR z review"
    review_frequency: continuous
    data_classification_scope: [L2,L3,L4]
    framework_mappings:
      - framework: ISO27002
        control_ref: "8.28 — Bezpieczne kodowanie"
        mapping_type: full
      - framework: OWASP_SAMM
        control_ref: "Implementation/Secure Build/2"
        mapping_type: full
      - framework: NIST_SSDF
        control_ref: "RV.1.1 — Identify vulnerabilities"
        mapping_type: full
      - framework: SOC2
        control_ref: "CC8.1 — Change management (review)"
        mapping_type: full
      - framework: CMMC
        control_ref: "SA.L2-3.14.2 — Security review"
        mapping_type: full

  - control_id: SSDLC.DEV.02
    title: "SAST w pipeline CI/CD (Semgrep, Bandit, ESLint Security i in.)"
    description: >
      Statyczna analiza bezpieczeństwa kodu (SAST) uruchamiana automatycznie
      w pipeline CI/CD przy każdym PR do main. Narzędzia open-source per stack:
      Semgrep (wielojęzykowy), Bandit (Python), ESLint Security (JS/TS),
      Gosec (Go), SpotBugs (Java), Brakeman (Ruby). BLOKADA merge przy
      severity CRITICAL/HIGH bez udokumentowanego wyjątku.
    policy_ref: POL-SSDLC
    section_ref: "POL-SSDLC sekcja 3.4; SSDLC-DEV Annex A"
    control_type: detective
    implementation_type: technical
    status: planned
    owner: "DevOps / Tech Lead"
    evidence_type: "Konfiguracja pipeline (YAML); raporty SAST z CI; log blokad merge"
    review_frequency: continuous
    data_classification_scope: [L2,L3,L4]
    framework_mappings:
      - framework: ISO27002
        control_ref: "8.28, 8.29 — Testy bezpieczeństwa"
        mapping_type: full
      - framework: OWASP_SAMM
        control_ref: "Verification/Security Testing/2"
        mapping_type: full
      - framework: NIST_SSDF
        control_ref: "PW.7.1 — Perform code review; RV.1.3"
        mapping_type: full
      - framework: SOC2
        control_ref: "CC8.1"
        mapping_type: full
      - framework: CMMC
        control_ref: "SA.L2-3.14.1 — Identify and report flaws"
        mapping_type: full
      - framework: DORA
        control_ref: "Art. 25 — Testing of ICT systems"
        mapping_type: supporting

  - control_id: SSDLC.DEV.03
    title: "SCA — skanowanie zależności open-source (Trivy, npm audit, pip-audit)"
    description: >
      Biblioteki open-source skanowane pod kątem znanych CVE w pipeline CI/CD
      (Trivy, OWASP Dependency-Check, npm audit, pip-audit). BLOKADA merge
      przy CVSS ≥ 9.0. Automatyczne PR aktualizujące zależności (Dependabot,
      Renovate). Tygodniowe skanowanie produkcji.
