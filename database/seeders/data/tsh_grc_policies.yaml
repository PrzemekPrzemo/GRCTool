      TSH posiada udokumentowany plan reagowania na incydenty (IRP) z: definicją
      incydentu, klasyfikacją SEV-1..4, procesem 6-etapowym (Identify → Contain →
      Eradicate → Recover → Lessons Learned), rolami i listą kontaktów.
      Plan testowany co najmniej raz w roku (tabletop exercise).
