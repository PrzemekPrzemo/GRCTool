    description: >
      Reguły DLP skanują wychodzącą pocztę pod kątem danych L3/L4 (PII, IBAN,
      klucze API, PHI). Dane L3: WARN + log; Dane L4: BLOCK + kwarantanna +
      alert CISO. Wdrożenie Google Workspace DLP w trybie Audit → Enforce
      (2 tygodnie audit przed enforcement).
