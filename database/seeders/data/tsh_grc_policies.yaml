# =============================================================================
# COVERAGE GAPS — Luki wymagające działania
# =============================================================================
coverage_gaps:

  critical_gaps:
    - gap_id: GAP-01
      title: "Brak wyznaczonego DPO"
      description: >
        POL-11 zawiera placeholder dla DPO. GDPR art. 37 może wymagać DPO
        dla TSH jako procesora danych dla klientów — weryfikacja z Legal.
      affected_frameworks: [GDPR, PDPL]
      remediation: "Analiza prawna obowiązku DPO; decyzja Zarządu; wyznaczenie DPO lub udokumentowanie braku obowiązku"
      target_date: "Q3 2026"

    - gap_id: GAP-02
      title: "Brak kanału whistleblowingowego"
      description: >
        POL-13 zawiera placeholder dla kanału zgłoszeń anonimowych. Dyrektywa
        UE o sygnalistach (2019/1937) może wymagać formalnego kanału.
      affected_frameworks: [NIS2, GDPR]
      remediation: "Wdrożenie narzędzia (np. EthicsPoint, Vault Platform, prosty formularz) lub ocena progu zatrudnienia"
      target_date: "Q3 2026"

    - gap_id: GAP-03
      title: "Brak SoA (Statement of Applicability)"
      description: >
        ISO 27001 wymaga formalnego SoA dokumentującego, które kontrole z Annex A
        są stosowane, a które wyłączone z uzasadnieniem. Wymagany do certyfikacji.
      affected_frameworks: [ISO27001]
      remediation: "Przeprowadzić gap analysis ISO 27001 i sporządzić SoA (szacowany nakład: ~20h CISO)"
      target_date: "Q4 2026"

    - gap_id: GAP-04
      title: "Brak formalnego Asset Inventory i Risk Register"
      description: >
        ISO 27001 i NIST CSF wymagają formalnych dokumentów. Aktualnie ISP
        opisuje procesy, ale nie istnieją jako odrębne, aktualizowane artefakty.
      affected_frameworks: [ISO27001, NIST_CSF, NCA_ECC]
      remediation: "Zbudować Asset Inventory (IT+dane+systemy klientów) i Risk Register w systemie GRC"
      target_date: "Q4 2026"

    - gap_id: GAP-05
      title: "Brak polityki Change Management (POL-16)"
      description: >
        SOC 2 CC8 wymaga formalnego procesu zarządzania zmianą. Aktualnie
        opisany w SSDLC ale bez dedykowanej polityki.
      affected_frameworks: [SOC2, ISO27001]
      remediation: "Opracować POL-16 Change Management (planowane Q3 2027)"
      target_date: "Q3 2027"

  high_gaps:
    - gap_id: GAP-06
      title: "Brak SIEM / Security Monitoring"
      description: >
        Detect function w NIST CSF i wymagania monitoringu NIS2/DORA nie są
        w pełni pokryte bez centralnego systemu korelacji zdarzeń.
      affected_frameworks: [NIST_CSF, NIS2, DORA, ISO27001]
      remediation: "Google Chronicle lub alternatywa — planowany Q2-Q3 2027"
      target_date: "Q3 2027"

    - gap_id: GAP-07
      title: "Brak formalnego programu zarządzania podatnościami"
      description: >
        Brakuje cyklicznego skanowania infrastruktury/środowisk chmurowych
        z SLA patchingowym (CVE Critical ≤ 7 dni) jako udokumentowanego procesu.
      affected_frameworks: [ISO27002, NIST_CSF, DORA, NCA_ECC]
      remediation: "Vulnerability Management Program — Q1-Q2 2027"
      target_date: "Q2 2027"

    - gap_id: GAP-08
      title: "Brak zewnętrznego pentstu"
      description: >
        Polityki przewidują testy penetracyjne, ale nie zostały przeprowadzone.
        Wymagane przez DORA (TLPT), SOC 2 (CC4.2), klientów enterprise.
      affected_frameworks: [DORA, SOC2, ISO27002, NCA_ECC]
      remediation: "Zamówienie zewnętrznego pentstu — Q1 2027"
      target_date: "Q1 2027"

# =============================================================================
# IMPORT INSTRUCTIONS — dla Claude Code
# =============================================================================
import_instructions:
  description: >
    Ten plik YAML stanowi kompletną bazę wiedzy polityk i kontroli TSH.
    Claude Code powinien go zinterpretować jako źródło prawdy dla systemu GRC.
  entities_to_create:
    - entity: Policy
      source: policies[]
      key_field: policy_id
      relations:
        - field: parent_policy
          target_entity: Policy
          relation_type: parent_of
        - field: child_policies
          target_entity: Policy
          relation_type: has_children
    - entity: Control
      source: controls[]
      key_field: control_id
      relations:
        - field: policy_ref
          target_entity: Policy
          relation_type: implements_policy
        - field: framework_mappings[].framework
          target_entity: Framework
          relation_type: maps_to_framework
    - entity: FrameworkCoverage
      source: compliance_coverage[]
      key_field: framework
      computed_fields:
        - name: covered_controls
          logic: "COUNT(controls WHERE framework IN framework_mappings[].framework)"
        - name: coverage_pct
          logic: "covered_controls / total_controls_in_standard * 100"
    - entity: CoverageGap
      source: coverage_gaps.critical_gaps + coverage_gaps.high_gaps
      key_field: gap_id
  queries_to_support:
    - "Które kontrole pokrywają dany standard (np. ISO27001)?"
    - "Jakie jest pokrycie TSH dla GDPR?"
    - "Które kontrole mają status 'planned' — co jest do wdrożenia?"
    - "Które polityki obejmują dane L4?"
    - "Jakie są krytyczne luki compliance?"
    - "Które kontrole mają owner = CISO?"
    - "Jakie dowody (evidence_type) są wymagane dla kontroli SOC 2?"
