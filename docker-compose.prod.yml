services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: grctool/app:latest
    container_name: grctool-app
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_KEY: ${APP_KEY}
      APP_URL: ${APP_URL}
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: grctool
      DB_USERNAME: grctool
      DB_PASSWORD: ${DB_PASSWORD}
      SESSION_DRIVER: database
      SESSION_SECURE_COOKIE: "true"
      SESSION_SAME_SITE: strict
      MAIL_MAILER: ${MAIL_MAILER:-log}
      MAIL_HOST: ${MAIL_HOST:-}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS:-grc@example.com}
      QUEUE_CONNECTION: database
      LOG_CHANNEL: stack
    volumes:
      - app-public:/var/www/html/public
      - app-storage:/var/www/html/storage
      - evidence-vault:/var/grc/evidence
    networks:
      - grctool

  mysql:
    image: mysql:8.4
    container_name: grctool-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: grctool
      MYSQL_USER: grctool
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/mysql/conf.d:/etc/mysql/conf.d:ro
    networks:
      - grctool
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "grctool", "-p$$DB_PASSWORD"]
      interval: 10s
      retries: 5
      start_period: 30s

  nginx:
    image: nginx:1.27-alpine
    container_name: grctool-nginx
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - app-public:/var/www/html/public:ro
      - app-storage:/var/www/html/storage:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/certs:/etc/nginx/certs:ro
    networks:
      - grctool

  queue:
    image: grctool/app:latest
    container_name: grctool-queue
    restart: unless-stopped
    depends_on:
      - app
      - mysql
    environment:
      APP_ENV: production
      APP_KEY: ${APP_KEY}
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_DATABASE: grctool
      DB_USERNAME: grctool
      DB_PASSWORD: ${DB_PASSWORD}
      QUEUE_CONNECTION: database
    command: php artisan queue:work --sleep=3 --tries=3 --max-time=3600
    volumes:
      - app-storage:/var/www/html/storage
      - evidence-vault:/var/grc/evidence
    networks:
      - grctool

  scheduler:
    image: grctool/app:latest
    container_name: grctool-scheduler
    restart: unless-stopped
    depends_on:
      - app
      - mysql
    environment:
      APP_ENV: production
      APP_KEY: ${APP_KEY}
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_DATABASE: grctool
      DB_USERNAME: grctool
      DB_PASSWORD: ${DB_PASSWORD}
    entrypoint: /bin/sh
    command: -c "while true; do php artisan schedule:run --verbose --no-interaction; sleep 60; done"
    volumes:
      - app-storage:/var/www/html/storage
    networks:
      - grctool

volumes:
  mysql-data:
  app-public:
  app-storage:
  evidence-vault:
    driver_opts:
      type: none
      device: /var/grc/evidence
      o: bind

networks:
  grctool:
    driver: bridge
