name: CI

on:
  push:
    branches: [main, develop, "claude/**"]
  pull_request:

jobs:
  test:
    name: Laravel · Pest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Print versions (diag)
        run: |
          php --version || echo "no php"
          composer --version || echo "no composer"
          which php composer || true
          uname -a
          ls -la

      - name: Install PHP + extensions (apt)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            php-cli php-mbstring php-xml php-curl php-zip php-gd php-bcmath \
            php-intl php-sqlite3 php-mysql php-tokenizer php-fileinfo unzip
          php --version
          composer --version

      - name: Bootstrap .env + sqlite
        run: |
          cp .env.example .env
          mkdir -p database
          touch database/database.sqlite

      - name: Install PHP dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Generate APP_KEY
        run: php artisan key:generate

      - name: Run migrations + seed
        run: php artisan migrate --seed --force

      - name: Smoke test — verify seed counts
        run: php artisan grc:smoke-counts

      - name: Run Pest tests
        run: vendor/bin/pest --no-coverage

  lint:
    name: Laravel Pint (code style)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install PHP + extensions
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            php-cli php-mbstring php-xml php-tokenizer php-fileinfo unzip
          php --version
          composer --version
      - name: Bootstrap .env
        run: cp .env.example .env
      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction --no-progress
      - name: Run Pint
        run: vendor/bin/pint --test -v

  build-frontend:
    name: Frontend build (Vite + Tailwind)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run build
