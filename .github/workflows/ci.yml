name: CI

on:
  push:
    branches: [main, develop, "claude/**"]
  pull_request:

jobs:
  hello:
    name: Sanity check
    runs-on: ubuntu-latest
    steps:
      - name: Echo hello
        run: |
          echo "Hello from CI"
          uname -a || echo "no uname"
          which php composer node npm bash sh || echo "missing tools"
          ls -la / || true

  test:
    name: Laravel tests
    runs-on: ubuntu-latest
    container:
      image: php:8.3-cli
    steps:
      - uses: actions/checkout@v4

      - name: Install deps inside container
        run: |
          apt-get update -qq
          apt-get install -y --no-install-recommends \
            git unzip libzip-dev libpng-dev libonig-dev libxml2-dev libicu-dev libcurl4-openssl-dev \
            ca-certificates
          docker-php-ext-install pdo_mysql mbstring tokenizer xml zip gd intl bcmath
          curl -sS https://getcomposer.org/installer | php -- --install-dir=/usr/local/bin --filename=composer
          php --version
          composer --version

      - name: Bootstrap .env + sqlite
        run: |
          cp .env.example .env
          mkdir -p database
          touch database/database.sqlite

      - name: Composer install
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: APP_KEY
        run: php artisan key:generate

      - name: Migrations + seed
        run: php artisan migrate --seed --force

      - name: Smoke test
        run: php artisan grc:smoke-counts

      - name: Pest
        run: vendor/bin/pest --no-coverage

      - name: Pint
        run: vendor/bin/pint --test

  build-frontend:
    name: Frontend build (Vite + Tailwind)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run build
