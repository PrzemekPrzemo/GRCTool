name: CI

on:
  push:
    branches: [main, develop, "claude/**"]
  pull_request:

jobs:
  test:
    name: Laravel · Pest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Diagnostic — what's pre-installed
        run: |
          echo "=== System ==="
          uname -a
          cat /etc/os-release || true
          echo "=== Tools ==="
          which php composer node npm bash sh || true
          php --version || echo "no php"
          composer --version || echo "no composer"
          echo "=== Files ==="
          ls -la
          echo "=== Done diag ==="

      - name: Run pipeline (capture all output, never fail step)
        id: pipeline
        run: |
          set +e
          {
            echo "=== cp .env ==="
            cp .env.example .env && echo "OK"
            echo "=== mkdir db ==="
            mkdir -p database && touch database/database.sqlite && echo "OK"
            echo "=== composer install ==="
            composer install --prefer-dist --no-interaction --no-progress 2>&1
            echo "exit=$?"
            echo "=== artisan key:generate ==="
            php artisan key:generate 2>&1
            echo "exit=$?"
            echo "=== artisan migrate ==="
            php artisan migrate --seed --force 2>&1
            echo "exit=$?"
            echo "=== smoke ==="
            php artisan grc:smoke-counts 2>&1
            echo "exit=$?"
            echo "=== pest ==="
            vendor/bin/pest --no-coverage 2>&1
            PEST_EXIT=$?
            echo "exit=$PEST_EXIT"
            echo "=== pint ==="
            vendor/bin/pint --test -v 2>&1
            PINT_EXIT=$?
            echo "exit=$PINT_EXIT"
            echo "PEST_FINAL=$PEST_EXIT" > /tmp/exit.env
            echo "PINT_FINAL=$PINT_EXIT" >> /tmp/exit.env
          } 2>&1 | tee /tmp/pipeline.log

      - name: Verdict
        run: |
          source /tmp/exit.env 2>/dev/null || true
          echo "Pest exit: ${PEST_FINAL:-?}"
          echo "Pint exit: ${PINT_FINAL:-?}"
          if [ "${PEST_FINAL:-1}" = "0" ] && [ "${PINT_FINAL:-1}" = "0" ]; then
            echo "ALL GREEN"
            exit 0
          else
            echo "FAILED — see Pipeline step above for details"
            exit 1
          fi

  build-frontend:
    name: Frontend build (Vite + Tailwind)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run build
