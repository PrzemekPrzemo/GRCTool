name: CI

on:
  push:
    branches: [main, develop, "claude/**"]
  pull_request:

jobs:
  test:
    name: PHP ${{ matrix.php }} · Laravel · Pest
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: ["8.3", "8.4"]

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none

      - name: Print versions (diag)
        run: |
          php --version
          composer --version
          which php composer
          ls -la

      - name: Bootstrap .env + sqlite db
        run: |
          cp .env.example .env
          mkdir -p database
          touch database/database.sqlite

      - name: Install PHP dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Generate APP_KEY
        run: php artisan key:generate

      - name: Run migrations + seed
        run: php artisan migrate --seed --force

      - name: Smoke test — verify seed counts
        run: php artisan grc:smoke-counts

      - name: Run Pest tests
        run: vendor/bin/pest --no-coverage

  lint:
    name: Laravel Pint (code style)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          coverage: none
      - name: Print versions (diag)
        run: |
          php --version
          composer --version
      - name: Bootstrap .env
        run: cp .env.example .env
      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction --no-progress
      - name: Run Pint
        run: vendor/bin/pint --test -v

  build-frontend:
    name: Frontend build (Vite + Tailwind)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run build
